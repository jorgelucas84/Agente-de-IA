<!DOCTYPE html> 
<html lang="pt-br">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Aulas | Lab Misturas Asfálticas</title>  
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="background: #1A4A5A; padding: 16px 0; color: white; text-align: center;">
        <h1>Uso para Aulas</h1>
    </header>

    <main class="container" style="max-width: 1100px; margin: 30px auto;">
        <a href="index.html" class="btn-voltar" style="text-decoration:none;">← Voltar ao menu</a>
        
        <input type="hidden" id="categoria-display" value="USO DO LABORATÓRIO PARA AULAS">
        
        <div id="container-lista-aulas" class="modo-lista-aulas" style="display:flex;">
            </div>

        </main>

    <script src="script.js"></script>
    <script>
        // Função específica para gerar a lista de aulas nesta página
        function gerarListaAulasEstaticas() {
            const ensaios = ["Dosagem Marshall", "Dosagem Superpave", "Extração de ligante", "Granulometria", "Densidade e absorção"];
            const container = document.getElementById('container-lista-aulas');
            container.innerHTML = ensaios.map(e => `
                <label class="item-aula-checkbox">
                    <input type="checkbox" class="check-ensaio-aula" value="${e}" onchange="atualizarDadosFinais()">
                    <span>${e}</span>
                </label>`).join('');
        }

        window.addEventListener('load', () => { 
            carregarHorarios(); 
            gerarListaAulasEstaticas();
        });
    </script>
</body>
</html>
